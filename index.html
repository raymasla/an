<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>步步為營 - 阿叡Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.85);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --board-bg: #1e293b;
            --cell-bg: #334155;
            --wall-color: #f59e0b;
            --wall-hover: rgba(245, 158, 11, 0.5);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            touch-action: manipulation;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--container-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            width: 100%;
            max-width: 550px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        h1, h2 { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-top: 0;}
        .hidden { display: none !important; }

        .menu-btn {
            width: 100%; padding: 16px; margin: 12px 0; font-size: 18px; cursor: pointer;
            border: none; border-radius: 12px;
            background: var(--primary-grad);
            color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5); }
        .menu-btn:active { transform: translateY(0); }

        input {
            padding: 10px 15px; text-align: center; border: 1px solid #475569;
            border-radius: 8px; background: #1e293b; color: white; outline: none; transition: 0.3s;
            width: 80%; margin: 10px 0;
        }
        input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }

        /* 房間列表 */
        .room-item {
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; margin: 12px 0;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: 0.3s;
        }
        .room-item:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }

        /* 棋盤佈局 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(17, 1fr);
            grid-template-rows: repeat(17, 1fr);
            gap: 2px;
            background: var(--board-bg);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            margin: 0 auto;
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cell:hover { filter: brightness(1.2); }
        
        .wall-h { background: transparent; cursor: pointer; }
        .wall-v { background: transparent; cursor: pointer; }
        .wall-intersection { background: transparent; pointer-events: none; }
        
        .wall-h:hover, .wall-v:hover { background: var(--wall-hover); }
        .wall-placed { background: var(--wall-color) !important; box-shadow: 0 0 10px var(--wall-color); }

        .preview-move { background: rgba(99, 102, 241, 0.5); border: 2px dashed #8b5cf6; }
        
        .emoji-rotated { transform: rotate(180deg); } /* 手機對坐遊玩 */

        /* 表情符號選擇器 */
        .emoji-keyboard {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            margin: 15px 0;
        }
        .emoji-btn {
            font-size: 2rem; background: rgba(255,255,255,0.1); border: none; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; padding: 10px;
        }
        .emoji-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .emoji-selected { background: rgba(16, 185, 129, 0.4); border: 2px solid var(--accent-green); }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--accent-orange); font-weight: bold;}
    </style>
</head>
<body>

<div id="home-screen" class="container">
    <h1>步步為營</h1>
    <p style="color: var(--text-muted); font-size: 0.9em;">阻擋對手，率先抵達對岸！</p>
    
    <div id="room-list"></div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
    
    <h3>創立新房間</h3>
    <input type="text" id="new-room-name" placeholder="房間名稱" value="阿叡的步步為營">
    <input type="text" id="new-room-pwd" placeholder="密碼 (留空代表無)">
    <button class="menu-btn" onclick="createRoom()">創立 步步為營</button>
</div>

<div id="lobby-screen" class="container hidden">
    <h2>進入房間</h2>
    <input type="text" id="player-nickname" placeholder="輸入你的暱稱">
    <p>選擇你的代表旗子：</p>
    <div class="emoji-keyboard" id="emoji-picker">
        </div>
    <button class="menu-btn" onclick="joinAndReady()">準備 / 開始遊戲</button>
    <button class="menu-btn" style="background: #475569;" onclick="goHome()">返回首頁</button>
</div>

<div id="game-screen" class="container hidden">
    <div class="info-bar">
        <span id="p2-info">等待玩家... (牆壁: 10)</span>
    </div>
    <div class="game-board" id="board">
        </div>
    <div class="info-bar" style="margin-top: 15px;">
        <span id="p1-info">你 (牆壁: 10)</span>
    </div>
    <div id="turn-indicator" style="margin-top: 10px; font-weight: bold; color: var(--accent-green);">輪到你了！請移動旗子或放置牆壁。</div>
    <button class="menu-btn" style="background: #ef4444; margin-top: 20px;" onclick="exitGame()">離開房間</button>
</div>

<script type="module">
    // ==========================================
    // 1. Firebase 核心初始化 (請填入你的設定)
    // ==========================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove, push, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        // 請在此貼上你的 Firebase Config
        // apiKey: "...",
        // authDomain: "...",
        // databaseURL: "...",
        // projectId: "...",
        // storageBucket: "...",
        // messagingSenderId: "...",
        // appId: "..."
    };

    let app, db;
    try {
        app = initializeApp(firebaseConfig);
        db = getDatabase(app);
    } catch(e) {
        console.error("Firebase 初始化失敗，請確認 Config", e);
    }

    // ==========================================
    // 2. 全域變數與 Emoji 設定
    // ==========================================
    const emojis = ["😎", "🤡", "👻", "👽", "💩", "🤖", "🎃", "😈", "🤠", "🥶"];
    let myEmoji = "😎";
    let myName = "玩家" + Math.floor(Math.random() * 1000);
    let currentRoomId = null;
    let isPlayer1 = true; // P1在下方(往上走), P2在上方(往下走)
    let isSingleDeviceMode = false;

    // 遊戲狀態 (本機快取)
    let gameState = {
        turn: 1, // 1 或 2
        p1: { r: 16, c: 8, walls: 10, emoji: "😎", name: "" }, // 棋盤座標 (17x17中，底部位於r=16, c=8)
        p2: { r: 0, c: 8, walls: 10, emoji: "🤡", name: "" },  // 頂部位於 r=0, c=8
        walls: [], // 記錄已放置的牆壁 ID
        status: "waiting" // waiting, playing, ended
    };
    
    let showingPreview = false;

    // 初始化 Emoji 鍵盤
    const emojiContainer = document.getElementById('emoji-picker');
    emojis.forEach(e => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn' + (e === myEmoji ? ' emoji-selected' : '');
        btn.innerText = e;
        btn.onclick = () => {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-selected'));
            btn.classList.add('emoji-selected');
            myEmoji = e;
        };
        emojiContainer.appendChild(btn);
    });

    // ==========================================
    // 3. UI 導覽邏輯
    // ==========================================
    function showScreen(id) {
        ['home-screen', 'lobby-screen', 'game-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.goHome = () => { showScreen('home-screen'); currentRoomId = null; };

    // ==========================================
    // 4. 房間系統 (建立與監聽)
    // ==========================================
    if(db) {
        const roomsRef = ref(db, 'quoridor_rooms');
        onValue(roomsRef, (snapshot) => {
            const rooms = snapshot.val() || {};
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            
            Object.keys(rooms).forEach(key => {
                const room = rooms[key];
                if(room.status === 'ended') return;
                
                const div = document.createElement('div');
                div.className = 'room-item';
                div.innerHTML = `
                    <div style="text-align: left;">
                        <div style="font-weight:bold; font-size:1.1em;">${room.name} ${room.pwd ? '🔒' : ''}</div>
                        <div style="font-size:0.8em; color:var(--text-muted);">狀態: ${room.status === 'waiting' ? '等待中' : '遊戲中'}</div>
                    </div>
                    <button class="menu-btn" style="width: auto; padding: 8px 15px; margin:0;" onclick="enterLobby('${key}', '${room.pwd}')">加入</button>
                `;
                // 將最新的房間放在最上方
                list.insertBefore(div, list.firstChild);
            });
        });
    }

    window.createRoom = async () => {
        if(!db) return alert("Firebase 未連結！目前只能純前端展示 (如需單機測試請略過資料庫限制自行修改碼)。");
        const name = document.getElementById('new-room-name').value || '阿叡的步步為營';
        const pwd = document.getElementById('new-room-pwd').value;
        
        const newRoomRef = push(ref(db, 'quoridor_rooms'));
        currentRoomId = newRoomRef.key;
        
        await set(newRoomRef, {
            name: name,
            pwd: pwd,
            status: 'waiting',
            p1: null,
            p2: null,
            state: gameState
        });
        
        showScreen('lobby-screen');
    };

    window.enterLobby = (roomId, hasPwd) => {
        if(hasPwd) {
            const input = prompt("請輸入密碼:");
            if(input !== hasPwd) return alert("密碼錯誤！");
        }
        currentRoomId = roomId;
        showScreen('lobby-screen');
    };

    window.joinAndReady = async () => {
        myName = document.getElementById('player-nickname').value || myName;
        
        const roomRef = ref(db, `quoridor_rooms/${currentRoomId}`);
        const snap = await get(roomRef);
        const room = snap.val();
        
        if(!room.p1) {
            isPlayer1 = true;
            await update(roomRef, { 
                p1: { name: myName, emoji: myEmoji },
                'state/p1/emoji': myEmoji,
                'state/p1/name': myName
            });
            onDisconnect(roomRef).remove(); // 房主斷線刪房
        } else if(!room.p2) {
            isPlayer1 = false;
            await update(roomRef, { 
                p2: { name: myName, emoji: myEmoji },
                status: 'playing',
                'state/p2/emoji': myEmoji,
                'state/p2/name': myName
            });
        } else if(room.p1.name === myName) {
            isPlayer1 = true; // 重新連線
        } else {
            return alert("房間已滿！");
        }

        // 單人開局判定 (手機對坐模式)
        if (isPlayer1 && !room.p2) {
            const confirmSingle = confirm("目前只有你一個人，是否要開始單機雙人模式？(畫面頂部的表情符號將會顛倒顯示)");
            if(confirmSingle) {
                isSingleDeviceMode = true;
                await update(roomRef, { 
                    p2: { name: "對面玩家", emoji: "🤖" },
                    status: 'playing',
                    'state/p2/emoji': "🤖",
                    'state/p2/name': "對面玩家"
                });
            } else {
                return; // 繼續等待
            }
        }

        initBoard();
        showScreen('game-screen');
        listenToGame();
    };

    window.exitGame = () => {
        if(db && currentRoomId) remove(ref(db, `quoridor_rooms/${currentRoomId}`));
        goHome();
    };

    // ==========================================
    // 5. 步步為營 核心邏輯與渲染
    // ==========================================
    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        // 17x17 網格：偶數是格子(0,2,4...)，奇數是牆壁縫隙(1,3,5...)
        for (let r = 0; r < 17; r++) {
            for (let c = 0; c < 17; c++) {
                const div = document.createElement('div');
                div.id = `cell-${r}-${c}`;
                
                if (r % 2 === 0 && c % 2 === 0) {
                    div.className = 'cell';
                    div.onclick = () => handleCellClick(r, c);
                } else if (r % 2 !== 0 && c % 2 !== 0) {
                    div.className = 'wall-intersection'; // 十字交界處，不能點
                } else if (r % 2 === 0 && c % 2 !== 0) {
                    div.className = 'wall-v'; // 直牆的半邊
                    div.onclick = () => tryPlaceWall(r, c, 'v');
                } else {
                    div.className = 'wall-h'; // 橫牆的半邊
                    div.onclick = () => tryPlaceWall(r, c, 'h');
                }
                
                board.appendChild(div);
            }
        }
    }

    function listenToGame() {
        if(!db || !currentRoomId) return;
        onValue(ref(db, `quoridor_rooms/${currentRoomId}/state`), (snap) => {
            const state = snap.val();
            if(state) {
                gameState = state;
                renderGame();
            }
        });
    }

    function renderGame() {
        // 清除舊的狀態
        document.querySelectorAll('.cell').forEach(el => { el.innerText = ''; el.classList.remove('preview-move'); });
        document.querySelectorAll('.wall-h, .wall-v').forEach(el => el.classList.remove('wall-placed'));

        // 渲染玩家
        const p1Cell = document.getElementById(`cell-${gameState.p1.r}-${gameState.p1.c}`);
        if(p1Cell) {
            p1Cell.innerText = gameState.p1.emoji;
            if(!isPlayer1 && !isSingleDeviceMode) p1Cell.classList.add('emoji-rotated'); 
        }
        
        const p2Cell = document.getElementById(`cell-${gameState.p2.r}-${gameState.p2.c}`);
        if(p2Cell) {
            p2Cell.innerText = gameState.p2.emoji;
            // 如果是單機模式，對面(P2)的符號要顛倒；如果是一般連線且我是P1，P2是正常對手，但在我的畫面上P2可以顛倒增加帶入感
            if(isPlayer1 || isSingleDeviceMode) p2Cell.classList.add('emoji-rotated');
        }

        // 渲染牆壁
        (gameState.walls || []).forEach(wallId => {
            const [r, c, type] = wallId.split('-');
            const ir = parseInt(r), ic = parseInt(c);
            if(type === 'h') {
                document.getElementById(`cell-${ir}-${ic}`).classList.add('wall-placed');
                document.getElementById(`cell-${ir}-${ic+1}`).classList.add('wall-placed'); // 交界
                document.getElementById(`cell-${ir}-${ic+2}`).classList.add('wall-placed');
            } else {
                document.getElementById(`cell-${ir}-${ic}`).classList.add('wall-placed');
                document.getElementById(`cell-${ir+1}-${ic}`).classList.add('wall-placed');
                document.getElementById(`cell-${ir+2}-${ic}`).classList.add('wall-placed');
            }
        });

        // UI 更新
        document.getElementById('p1-info').innerText = `${isPlayer1 ? '(你)' : ''} ${gameState.p1.name} (牆壁: ${gameState.p1.walls})`;
        document.getElementById('p2-info').innerText = `${!isPlayer1 ? '(你)' : ''} ${gameState.p2.name} (牆壁: ${gameState.p2.walls})`;

        const isMyTurn = isSingleDeviceMode ? true : (isPlayer1 && gameState.turn === 1) || (!isPlayer1 && gameState.turn === 2);
        const turnInd = document.getElementById('turn-indicator');
        if(isMyTurn) {
            let activePlayerName = gameState.turn === 1 ? gameState.p1.name : gameState.p2.name;
            turnInd.innerText = isSingleDeviceMode ? `輪到 ${activePlayerName} 了！請點擊你的旗子查看路徑。` : "輪到你了！請點擊你的旗子或放置牆壁。";
            turnInd.style.color = "var(--accent-green)";
        } else {
            turnInd.innerText = "等待對手行動...";
            turnInd.style.color = "var(--text-muted)";
        }
    }

    // ==========================================
    // 6. 遊戲互動邏輯 (移動與牆壁)
    // ==========================================
    function handleCellClick(r, c) {
        const isMyTurn = isSingleDeviceMode ? true : (isPlayer1 && gameState.turn === 1) || (!isPlayer1 && gameState.turn === 2);
        if(!isMyTurn) return;

        const activePlayer = gameState.turn === 1 ? gameState.p1 : gameState.p2;

        // 點擊自己的旗子顯示預覽
        if(r === activePlayer.r && c === activePlayer.c) {
            showingPreview = !showingPreview;
            if(showingPreview) showValidMoves(activePlayer);
            else renderGame();
            return;
        }

        // 點擊預覽格子進行移動
        const targetCell = document.getElementById(`cell-${r}-${c}`);
        if(targetCell && targetCell.classList.contains('preview-move')) {
            activePlayer.r = r;
            activePlayer.c = c;
            endTurn();
        }
    }

    function showValidMoves(player) {
        const moves = getValidMoves(player.r, player.c);
        moves.forEach(m => {
            document.getElementById(`cell-${m.r}-${m.c}`).classList.add('preview-move');
        });
    }

    // 取得合法移動 (包含跳躍邏輯)
    function getValidMoves(r, c) {
        const moves = [];
        const opponent = gameState.turn === 1 ? gameState.p2 : gameState.p1;
        const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]]; // 上, 下, 左, 右

        dirs.forEach(d => {
            const nr = r + d[0];
            const nc = c + d[1];
            if(nr < 0 || nr > 16 || nc < 0 || nc > 16) return; // 超出邊界

            // 檢查中間是否有牆壁阻擋
            const wallR = r + d[0]/2;
            const wallC = c + d[1]/2;
            if(isWallPlaced(wallR, wallC)) return;

            // 檢查目標位置是否有對手
            if(nr === opponent.r && nc === opponent.c) {
                // 嘗試直線跳躍 (再往前走一格)
                const jumpR = nr + d[0];
                const jumpC = nc + d[1];
                const jumpWallR = nr + d[0]/2;
                const jumpWallC = nc + d[1]/2;

                if(jumpR >= 0 && jumpR <= 16 && jumpC >= 0 && jumpC <= 16 && !isWallPlaced(jumpWallR, jumpWallC)) {
                    moves.push({r: jumpR, c: jumpC});
                } else {
                    // 直線被擋住或出界，改為斜跳 (檢查側面)
                    // 如果原本是上下移動(d[0]!=0)，側面就是左右(col +- 2)
                    if(d[0] !== 0) { 
                        if(!isWallPlaced(nr, nc-1) && nc-2 >= 0) moves.push({r: nr, c: nc-2});
                        if(!isWallPlaced(nr, nc+1) && nc+2 <= 16) moves.push({r: nr, c: nc+2});
                    } else { // 原本是左右移動，側面就是上下(row +- 2)
                        if(!isWallPlaced(nr-1, nc) && nr-2 >= 0) moves.push({r: nr-2, c: nc});
                        if(!isWallPlaced(nr+1, nc) && nr+2 <= 16) moves.push({r: nr+2, c: nc});
                    }
                }
            } else {
                moves.push({r: nr, c: nc}); // 正常走一步
            }
        });
        return moves;
    }

    // 放置牆壁
    function tryPlaceWall(r, c, type) {
        const isMyTurn = isSingleDeviceMode ? true : (isPlayer1 && gameState.turn === 1) || (!isPlayer1 && gameState.turn === 2);
        if(!isMyTurn) return;

        const activePlayer = gameState.turn === 1 ? gameState.p1 : gameState.p2;
        if(activePlayer.walls <= 0) return alert("牆壁已經用完！");

        // 計算牆壁的 3 個部分，確保沒有重疊
        let parts = [];
        if(type === 'h') {
            if(c % 2 !== 0) c -= 1; // 對齊到起點
            if(c > 14) return; // 超出邊界
            parts = [[r, c], [r, c+1], [r, c+2]];
        } else {
            if(r % 2 !== 0) r -= 1; // 對齊到起點
            if(r > 14) return;
            parts = [[r, c], [r+1, c], [r+2, c]];
        }

        // 檢查重疊
        for(let p of parts) {
            if(isWallPlaced(p[0], p[1])) return alert("這裡已經有牆壁了或產生重疊！");
        }

        // 暫時將牆壁加入狀態，以進行 BFS 驗證 (不能關廁所)
        const wallId = `${r}-${c}-${type}`;
        if(!gameState.walls) gameState.walls = [];
        gameState.walls.push(wallId);

        if(!canReachGoal(gameState.p1, 0) || !canReachGoal(gameState.p2, 16)) {
            gameState.walls.pop(); // 撤銷
            return alert("不能完全堵死任何一位玩家的去路！(防關廁所機制)");
        }

        // 成功放置
        activePlayer.walls--;
        endTurn();
    }

    function isWallPlaced(r, c) {
        if(!gameState.walls) return false;
        for(let w of gameState.walls) {
            const [wr, wc, type] = w.split('-');
            const ir = parseInt(wr), ic = parseInt(wc);
            if(type === 'h') {
                if(r === ir && (c === ic || c === ic+1 || c === ic+2)) return true;
            } else {
                if(c === ic && (r === ir || r === ir+1 || r === ir+2)) return true;
            }
        }
        return false;
    }

    // BFS 尋路：確保玩家能走到對岸 (目標 Row)
    function canReachGoal(player, targetRow) {
        const queue = [{r: player.r, c: player.c}];
        const visited = new Set();
        visited.add(`${player.r}-${player.c}`);

        while(queue.length > 0) {
            const curr = queue.shift();
            if(curr.r === targetRow) return true;

            const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]];
            for(let d of dirs) {
                const nr = curr.r + d[0];
                const nc = curr.c + d[1];
                if(nr < 0 || nr > 16 || nc < 0 || nc > 16) continue;
                
                const wallR = curr.r + d[0]/2;
                const wallC = curr.c + d[1]/2;
                if(isWallPlaced(wallR, wallC)) continue;

                if(!visited.has(`${nr}-${nc}`)) {
                    visited.add(`${nr}-${nc}`);
                    queue.push({r: nr, c: nc});
                }
            }
        }
        return false;
    }

    // 結束回合
    function endTurn() {
        showingPreview = false;
        
        // 檢查勝利
        if(gameState.p1.r === 0) {
            alert(gameState.p1.name + " 獲勝！");
            gameState.status = 'ended';
        } else if(gameState.p2.r === 16) {
            alert(gameState.p2.name + " 獲勝！");
            gameState.status = 'ended';
        } else {
            gameState.turn = gameState.turn === 1 ? 2 : 1;
        }

        // 同步回 Firebase
        if(db && currentRoomId) {
            update(ref(db, `quoridor_rooms/${currentRoomId}`), { state: gameState });
        } else {
            // 單機離線測試
            renderGame();
        }
    }
</script>
